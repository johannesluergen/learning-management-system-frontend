<div class="parent">
<section class="main-auth-box">

  <h1>LMS Login</h1>
  @if( failedAuthFlag() ){
    <p class="error-message">Stored authentication invalid. Your session has 
    most<br>likely expired. Please log in again.</p>
  }@else{
    <h2>If you are ready to learn, please log in<br>with your User-Email and password</h2>
  }
  
  <label>
    User-Email:
    <input type="text" placeholder="JohnDoe1234" [(ngModel)]="userEmail">
  </label>
  
  <label>
    Password:
    <input type="password" [(ngModel)]="password">
  </label>
  
  <button class="enter-button"(click)="submitCredentials()">Submit Login Credentials</button>
  
  @if( badCredentialsFlag() ){
    <p class="error-message">{{ errorMessage }}</p>
  }
  
  <nav>
    <ul>
      <li>
        <a routerLink="../register">New here? Register as user</a>
      </li>
    </ul>
  </nav>
  
  
</section>
</div>
